# ═══════════════════════════════════════════════════════════════════════════════
#  RMASC FACTORY — Nginx Production Configuration
#  Serveur : 192.168.1.95 (rmasc-local)
#  Rôle    : Reverse proxy pour l'application RMASC ERP
#  Frontend: Fichiers statiques (build Vite → /opt/rmasc/dist)
#  Backend : Proxy inverse vers Node.js (port 4000)
# ═══════════════════════════════════════════════════════════════════════════════

upstream rmasc_backend {
    server 127.0.0.1:4000;
    keepalive 64;
}

server {
    listen 80;
    server_name 192.168.1.95 localhost rmasc-local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name 192.168.1.95 localhost rmasc-local;

    # ── SSL (Let's Encrypt via Certbot ou certificat auto-signé) ─────────
    ssl_certificate     /etc/nginx/ssl/rmasc.crt;
    ssl_certificate_key /etc/nginx/ssl/rmasc.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Sécurité ──────────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 10m;
    client_body_timeout 30s;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_vary on;

    # ── Logs ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/rmasc-access.log;
    error_log  /var/log/nginx/rmasc-error.log;

    # ── Frontend (fichiers statiques) ─────────────────────────────────────
    root /opt/rmasc/dist;
    index index.html;

    # Service Worker et assets avec cache long
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /images/ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Fichiers statiques (JS, CSS, etc.)
    location / {
        try_files $uri $uri/ /index.html;

        # Pas de cache pour index.html (toujours dernière version)
        location = /index.html {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # ── API Backend (proxy vers Node.js) ──────────────────────────────────
    location /api/ {
        proxy_pass http://rmasc_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;

        # Timeouts plus longs pour les requêtes API
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # CORS headers
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # ── Health check (sans authentification) ─────────────────────────────
    location /api/health {
        proxy_pass http://rmasc_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # ── Interdire l'accès aux fichiers sensibles ─────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /(node_modules|src|\.git) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
